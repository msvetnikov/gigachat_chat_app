[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/api/chat/completions"
  to = "/.netlify/functions/chat-completions"
  status = 200

[[redirects]]
  from = "/api/models"
  to = "/.netlify/functions/models"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
